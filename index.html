<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>💰 Balance - Finanz-Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Outfit', sans-serif; background: #F8FAFC; overflow: hidden; }
    input, textarea, select, button { font-family: 'Outfit', inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyAFOy_Y-Q6gjk2GyUKMcP-G62y7b8CVfdY",
      authDomain: "balance-8e396.firebaseapp.com",
      projectId: "balance-8e396",
      storageBucket: "balance-8e396.firebasestorage.app",
      messagingSenderId: "1013514403965",
      appId: "1:1013514403965:web:8bd93bd7297abcc6dc7114"
    };

    let firebaseDb = null;
    const initFirebase = () => {
      if (!firebaseDb && typeof firebase !== 'undefined') {
        try {
          if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
          }
          firebaseDb = firebase.database();
        } catch (e) {
          console.log('Firebase init:', e.message);
        }
      }
      return firebaseDb;
    };

    const FinanceApp = () => {
      // ==================== AUTH ====================
      const [appPassword, setAppPassword] = useState('');
      const [appPasswordWrong, setAppPasswordWrong] = useState(false);
      const [appUnlocked, setAppUnlocked] = useState(false);
      const [rememberPassword, setRememberPassword] = useState(() => localStorage.getItem('financeAppRememberPassword') === 'true');
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [currentUser, setCurrentUser] = useState(null);
      const [loginMode, setLoginMode] = useState('login');
      const [loginName, setLoginName] = useState('');
      const [loginPassword, setLoginPassword] = useState('');
      const [loginPassword2, setLoginPassword2] = useState('');
      const [pairCode, setPairCode] = useState('');
      const [pairInput, setPairInput] = useState('');
      const [pairError, setPairError] = useState('');
      const [showPairModal, setShowPairModal] = useState(false);

      // ==================== APP STATE ====================
      const [currentView, setCurrentView] = useState('dashboard');
      const [showAddModal, setShowAddModal] = useState(false);
      const [editingExpenseId, setEditingExpenseId] = useState(null);
      const [editingCategoryId, setEditingCategoryId] = useState(null);
      const [showReceiptModal, setShowReceiptModal] = useState(null);
      const [showBudgetForm, setShowBudgetForm] = useState(false);
      const [draggedBudget, setDraggedBudget] = useState(null);
      const [copiedCode, setCopiedCode] = useState(false);
      const [insightsStart, setInsightsStart] = useState(() => { const date = new Date(); date.setDate(1); return date.toISOString().split('T')[0]; });
      const [insightsEnd, setInsightsEnd] = useState(() => new Date().toISOString().split('T')[0]);
      const [firebaseEnabled, setFirebaseEnabled] = useState(() => localStorage.getItem('financeAppFirebaseEnabled') === 'true');
      const [firebaseSyncStatus, setFirebaseSyncStatus] = useState('disconnected');

      // ==================== DATA ====================
      const [appData, setAppData] = useState(() => {
        const saved = localStorage.getItem('financeAppData');
        return saved ? JSON.parse(saved) : {
          users: {},
          pairCode: '',
          categories: [
            { id: 'food', name: 'Lebensmittel', color: '#10B981', rules: ['aldi', 'rewe', 'lidl', 'edeka', 'supermarkt', 'markt'] },
            { id: 'dining', name: 'Gastronomie', color: '#F59E0B', rules: ['restaurant', 'pizza', 'cafe', 'bar', 'delivery'] },
            { id: 'transport', name: 'Transport', color: '#8B5CF6', rules: ['uber', 'db', 'bahn', 'parking', 'tankstelle'] },
            { id: 'entertainment', name: 'Unterhaltung', color: '#EF4444', rules: ['cinema', 'kino', 'netflix', 'spotify'] },
            { id: 'utilities', name: 'Nebenkosten', color: '#06B6D4', rules: ['strom', 'wasser', 'gas', 'internet'] },
            { id: 'other', name: 'Sonstiges', color: '#6B7280', rules: [] }
          ],
          expenses: [],
          budgets: {},
          settlements: []
        };
      });

      // ==================== FORMS ====================
      const [expenseForm, setExpenseForm] = useState({ amount: '', description: '', category: '', paidBy: '', participants: {}, isShared: true, receipt: null, date: new Date().toISOString().split('T')[0] });
      const [newCategoryForm, setNewCategoryForm] = useState({ name: '', color: '#3B82F6', rules: '' });
      const [newBudgetForm, setNewBudgetForm] = useState({ name: '', limit: '', categories: [] });

      // ==================== SYNC ====================
      useEffect(() => { localStorage.setItem('financeAppData', JSON.stringify(appData)); }, [appData]);
      useEffect(() => { const savedUser = localStorage.getItem('financeAppCurrentUser'); if (savedUser && appData.users[savedUser]) { setCurrentUser(savedUser); setIsLoggedIn(true); } }, [appData.users]);
      useEffect(() => { if (localStorage.getItem('financeAppRememberPassword') === 'true') { setAppUnlocked(true); } }, []);

      // Firebase Sync - einfach ohne Auth
      useEffect(() => {
        if (!firebaseEnabled || !currentUser) return;
        
        try {
          const db = initFirebase();
          if (!db) return;

          const ref = firebase.database().ref('balance/' + currentUser);
          setFirebaseSyncStatus('syncing');
          
          ref.set(appData, (error) => {
            if (error) {
              console.error('Firebase error:', error);
              setFirebaseSyncStatus('error');
            } else {
              setFirebaseSyncStatus('synced');
            }
          });
        } catch (err) {
          console.error('Firebase sync error:', err);
          setFirebaseSyncStatus('error');
        }
      }, [firebaseEnabled, currentUser, appData]);

      // ==================== HANDLERS ====================
      const handleAppPassword = () => {
        if (appPassword === 'LustigerFinanceTrackervonLauraundElias-2026!') {
          setAppUnlocked(true);
          setAppPassword('');
          setAppPasswordWrong(false);
          if (rememberPassword) localStorage.setItem('financeAppRememberPassword', 'true');
        } else {
          setAppPasswordWrong(true);
          setAppPassword('');
        }
      };

      const generatePairCode = () => Math.random().toString(36).substring(2, 8).toUpperCase();

      const handleLogin = () => {
        const user = Object.values(appData.users).find(u => u.name.toLowerCase() === loginName.toLowerCase() && u.password === loginPassword);
        if (user) {
          setCurrentUser(user.id);
          setIsLoggedIn(true);
          localStorage.setItem('financeAppCurrentUser', user.id);
          setFirebaseEnabled(true);
          localStorage.setItem('financeAppFirebaseEnabled', 'true');
        }
      };

      const handleRegister = () => {
        if (loginPassword !== loginPassword2) { alert('Passwörter stimmen nicht überein!'); return; }
        const newUserId = Date.now().toString();
        const newCode = Object.values(appData.users).length === 0 ? generatePairCode() : appData.pairCode;
        setAppData(prev => ({
          ...prev,
          users: { ...prev.users, [newUserId]: { id: newUserId, name: loginName, password: loginPassword, color: Object.keys(prev.users).length === 0 ? '#3B82F6' : '#EC4899' } },
          pairCode: newCode,
          budgets: { ...prev.budgets, [newUserId]: [{ id: 'personal', name: 'Persönlich', limit: 999999, categories: [], isPersonal: true }] }
        }));
        setCurrentUser(newUserId);
        setIsLoggedIn(true);
        localStorage.setItem('financeAppCurrentUser', newUserId);
        setFirebaseEnabled(true);
        localStorage.setItem('financeAppFirebaseEnabled', 'true');
        setLoginMode('login');
        setLoginName('');
        setLoginPassword('');
        setLoginPassword2('');
      };

      const handleLogout = () => {
        setIsLoggedIn(false);
        setCurrentUser(null);
        localStorage.removeItem('financeAppCurrentUser');
        setAppUnlocked(false);
        localStorage.removeItem('financeAppRememberPassword');
      };

      const handleJoinWithPairCode = () => {
        if (!pairInput.trim()) { setPairError('Code eingeben!'); return; }
        if (pairInput.trim() === appData.pairCode && appData.pairCode) {
          setPairError('');
          setShowPairModal(false);
          setPairInput('');
          alert('Mit Partner verbunden!');
        } else {
          setPairError('Falscher Code!');
        }
      };

      const handleSettlement = () => {
        const balances = calculateBalances();
        const otherUserId = Object.values(appData.users).find(u => u.id !== currentUser)?.id;
        const amount = Math.abs(balances.balance);
        setAppData(prev => ({
          ...prev,
          expenses: [
            { id: Date.now().toString(), amount, description: 'Ausgleich', category: 'other', paidBy: balances.balance > 0 ? otherUserId : currentUser, participants: { [currentUser]: 0, [otherUserId]: 0 }, receipt: null, date: new Date().toISOString().split('T')[0], isSettlement: true },
            ...prev.expenses
          ]
        }));
        alert('Ausgleich gebucht!');
      };

      const handleReceiptUpload = (e) => {
        const file = e.target.files?.[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            setExpenseForm({...expenseForm, receipt: event.target?.result});
          };
          reader.readAsDataURL(file);
        }
      };

      const handleAddExpense = () => {
        if (!expenseForm.amount || !expenseForm.description) { alert('Betrag und Beschreibung erforderlich!'); return; }
        const category = expenseForm.category || detectCategory(expenseForm.description);
        const amount = parseFloat(expenseForm.amount);
        const totalPercent = Object.values(expenseForm.participants).reduce((a, b) => a + b, 0);
        if (expenseForm.isShared && Math.abs(totalPercent - 100) > 0.1) { alert('Anteile = 100%!'); return; }
        let participants = {}; Object.keys(expenseForm.participants).forEach(uid => { participants[uid] = (amount * expenseForm.participants[uid]) / 100; });
        if (editingExpenseId) {
          setAppData(prev => ({ ...prev, expenses: prev.expenses.map(e => e.id === editingExpenseId ? { ...e, amount, description: expenseForm.description, category, paidBy: expenseForm.paidBy || currentUser, participants, receipt: expenseForm.receipt || e.receipt, date: expenseForm.date } : e) }));
          setEditingExpenseId(null);
        } else {
          const newExpense = { id: Date.now().toString(), amount, description: expenseForm.description, category, paidBy: expenseForm.paidBy || currentUser, participants, receipt: expenseForm.receipt, date: expenseForm.date };
          setAppData(prev => ({ ...prev, expenses: [newExpense, ...prev.expenses] }));
        }
        const newP = initializeParticipants(); Object.keys(newP).forEach(uid => { newP[uid] = 50; });
        setExpenseForm({ amount: '', description: '', category: '', paidBy: currentUser, participants: newP, isShared: true, receipt: null, date: new Date().toISOString().split('T')[0] });
        setShowAddModal(false);
      };

      const handleEditExpense = (expense) => {
        setEditingExpenseId(expense.id);
        setExpenseForm({ amount: expense.amount.toString(), description: expense.description, category: expense.category, paidBy: expense.paidBy, participants: expense.participants, isShared: true, receipt: expense.receipt, date: expense.date });
        setShowAddModal(true);
      };

      const deleteExpense = (id) => { setAppData(prev => ({ ...prev, expenses: prev.expenses.filter(e => e.id !== id) })); };
      const deleteBudget = (budgetId) => { const budget = (appData.budgets[currentUser] || []).find(b => b.id === budgetId); if (budget?.isPersonal) { alert('Persönliches Budget nicht löschbar!'); return; } setAppData(prev => ({ ...prev, budgets: {...prev.budgets, [currentUser]: (prev.budgets[currentUser] || []).filter(b => b.id !== budgetId)} })); };
      const addCategory = () => { if (!newCategoryForm.name) return; const rules = newCategoryForm.rules.split('\n').map(r => r.trim()).filter(r => r.length > 0); setAppData(prev => ({ ...prev, categories: [...prev.categories.filter(c => c.id !== 'other'), { id: Date.now().toString(), name: newCategoryForm.name, color: newCategoryForm.color, rules }, prev.categories.find(c => c.id === 'other')] })); setNewCategoryForm({ name: '', color: '#3B82F6', rules: '' }); };
      const updateCategory = (id, updates) => { setAppData(prev => ({ ...prev, categories: prev.categories.map(c => c.id === id ? { ...c, ...updates } : c) })); };
      const addBudget = () => { if (!newBudgetForm.name || !newBudgetForm.limit) return; setAppData(prev => ({ ...prev, budgets: { ...prev.budgets, [currentUser]: [...(prev.budgets[currentUser] || []), { id: Date.now().toString(), name: newBudgetForm.name, limit: parseFloat(newBudgetForm.limit), categories: newBudgetForm.categories, isPersonal: false }] } })); setNewBudgetForm({ name: '', limit: '', categories: [] }); setShowBudgetForm(false); };

      const detectCategory = (text) => {
        const lower = text.toLowerCase();
        for (let cat of appData.categories) {
          for (let rule of cat.rules) {
            if (lower.includes(rule)) return cat.id;
          }
        }
        return '';
      };

      const getCategoryById = (id) => appData.categories.find(c => c.id === id) || appData.categories.find(c => c.id === 'other');
      const initializeParticipants = () => { const p = {}; Object.keys(appData.users).forEach(uid => { p[uid] = 0; }); return p; };
      const calculateBalances = () => {
        let balance = 0;
        appData.expenses.filter(e => !e.isSettlement).forEach(e => {
          if (e.paidBy === currentUser) balance += (e.amount - (e.participants[currentUser] || 0));
          else balance -= (e.participants[currentUser] || 0);
        });
        return { balance };
      };

      const calculateBudgetUsage = (budget) => {
        const catIds = budget.categories.length > 0 ? budget.categories : appData.categories.map(c => c.id);
        let used = 0;
        appData.expenses.filter(e => !e.isSettlement && e.participants[currentUser] > 0).forEach(e => {
          if (catIds.includes(e.category)) used += e.participants[currentUser] || 0;
        });
        return { used, limit: budget.limit, percent: (used / budget.limit) * 100, isOver: used > budget.limit };
      };

      const getInsightsData = () => {
        const startMonth = new Date(insightsStart);
        const endMonth = new Date(insightsEnd);
        const relevant = appData.expenses.filter(e => { const expDate = new Date(e.date); return expDate >= startMonth && expDate <= endMonth && e.participants[currentUser] > 0 && !e.isSettlement; });
        const byCategory = {}; let total = 0;
        relevant.forEach(e => {
          const amount = e.participants[currentUser] || 0;
          const cat = getCategoryById(e.category).name;
          byCategory[cat] = (byCategory[cat] || 0) + amount;
          total += amount;
        });
        return { byCategory, total, count: relevant.length };
      };

      const user = appData.users[currentUser];
      const userBudgets = (appData.budgets[currentUser] || []);
      const otherUser = Object.values(appData.users).find(u => u.id !== currentUser);

      // ==================== RENDER ====================
      if (!appUnlocked) {
        return (
          <div style={{ minHeight: '100vh', background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px' }}>
            <div style={{ background: 'rgba(255, 255, 255, 0.95)', borderRadius: '24px', padding: '40px', maxWidth: '400px', width: '100%', boxShadow: '0 20px 60px rgba(0, 0, 0, 0.3)' }}>
              <h1 style={{ fontSize: '36px', fontWeight: '700', margin: '0 0 8px 0', textAlign: 'center', background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', backgroundClip: 'text', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>Balance</h1>
              <p style={{ margin: '0 0 32px 0', color: '#9CA3AF', fontSize: '14px', textAlign: 'center' }}>Finanz-Tracker für Paare</p>
              <p style={{ margin: '0 0 16px 0', color: '#6B7280', fontSize: '13px', textAlign: 'center' }}>App-Passwort erforderlich</p>
              <input type="password" placeholder="Passwort" value={appPassword} onChange={(e) => { setAppPassword(e.target.value); setAppPasswordWrong(false); }} onKeyPress={(e) => e.key === 'Enter' && handleAppPassword()} style={{ width: '100%', padding: '10px 12px', border: appPasswordWrong ? '2px solid #FCA5A5' : '1.5px solid #E5E7EB', borderRadius: '10px', fontSize: '14px', marginBottom: '12px', boxSizing: 'border-box' }} />
              {appPasswordWrong && <div style={{ fontSize: '12px', color: '#EF4444', marginBottom: '12px' }}>Falsches Passwort</div>}
              <label style={{ display: 'flex', alignItems: 'center', gap: '8px', fontSize: '13px', color: '#6B7280', marginBottom: '16px', cursor: 'pointer' }}>
                <input type="checkbox" checked={rememberPassword} onChange={(e) => setRememberPassword(e.target.checked)} style={{ cursor: 'pointer' }} />
                Passwort speichern
              </label>
              <button onClick={handleAppPassword} style={{ width: '100%', padding: '12px', background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', color: '#FFF', border: 'none', borderRadius: '12px', fontSize: '16px', fontWeight: '600', cursor: 'pointer' }}>Entsperren</button>
            </div>
          </div>
        );
      }

      if (!isLoggedIn) {
        return (
          <div style={{ minHeight: '100vh', background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px' }}>
            <div style={{ background: 'rgba(255, 255, 255, 0.95)', borderRadius: '24px', padding: '40px', maxWidth: '400px', width: '100%', boxShadow: '0 20px 60px rgba(0, 0, 0, 0.3)' }}>
              <h1 style={{ fontSize: '28px', fontWeight: '700', margin: '0 0 24px 0', textAlign: 'center' }}>Balance</h1>
              <div style={{ display: 'flex', gap: '12px', marginBottom: '24px' }}>
                <button onClick={() => setLoginMode('login')} style={{ flex: 1, padding: '10px', background: loginMode === 'login' ? '#667eea' : '#E5E7EB', color: loginMode === 'login' ? '#FFF' : '#374151', border: 'none', borderRadius: '8px', fontWeight: '600', cursor: 'pointer' }}>Anmelden</button>
                <button onClick={() => setLoginMode('signup')} style={{ flex: 1, padding: '10px', background: loginMode === 'signup' ? '#667eea' : '#E5E7EB', color: loginMode === 'signup' ? '#FFF' : '#374151', border: 'none', borderRadius: '8px', fontWeight: '600', cursor: 'pointer' }}>Registrieren</button>
              </div>
              <input type="text" placeholder="Name" value={loginName} onChange={(e) => setLoginName(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && (loginMode === 'login' ? handleLogin() : handleRegister())} style={{ width: '100%', padding: '10px 12px', border: '1.5px solid #E5E7EB', borderRadius: '10px', marginBottom: '12px', fontSize: '14px', boxSizing: 'border-box' }} />
              <input type="password" placeholder="Passwort" value={loginPassword} onChange={(e) => setLoginPassword(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && (loginMode === 'login' ? handleLogin() : handleRegister())} style={{ width: '100%', padding: '10px 12px', border: '1.5px solid #E5E7EB', borderRadius: '10px', marginBottom: '12px', fontSize: '14px', boxSizing: 'border-box' }} />
              {loginMode === 'signup' && <input type="password" placeholder="Passwort wiederholen" value={loginPassword2} onChange={(e) => setLoginPassword2(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleRegister()} style={{ width: '100%', padding: '10px 12px', border: '1.5px solid #E5E7EB', borderRadius: '10px', marginBottom: '12px', fontSize: '14px', boxSizing: 'border-box' }} />}
              <button onClick={loginMode === 'login' ? handleLogin : handleRegister} style={{ width: '100%', padding: '12px', background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', color: '#FFF', border: 'none', borderRadius: '12px', fontWeight: '600', cursor: 'pointer', marginBottom: '12px' }}>{loginMode === 'login' ? 'Anmelden' : 'Registrieren'}</button>
              {Object.keys(appData.users).length > 0 && <button onClick={() => setShowPairModal(true)} style={{ width: '100%', padding: '10px', background: '#E5E7EB', border: 'none', borderRadius: '10px', fontWeight: '600', cursor: 'pointer', fontSize: '14px' }}>Mit Code verbinden</button>}
              {showPairModal && (
                <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0, 0, 0, 0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000 }}>
                  <div style={{ background: '#FFF', borderRadius: '16px', padding: '24px', maxWidth: '300px', width: '90%' }}>
                    <h2 style={{ margin: '0 0 16px 0', fontSize: '16px', fontWeight: '600' }}>Mit Partner verbinden</h2>
                    <input type="text" placeholder="Pair-Code" value={pairInput} onChange={(e) => { setPairInput(e.target.value); setPairError(''); }} onKeyPress={(e) => e.key === 'Enter' && handleJoinWithPairCode()} style={{ width: '100%', padding: '10px 12px', border: pairError ? '2px solid #EF4444' : '1.5px solid #E5E7EB', borderRadius: '10px', fontSize: '14px', marginBottom: '12px', boxSizing: 'border-box', textTransform: 'uppercase' }} />
                    {pairError && <div style={{ fontSize: '12px', color: '#EF4444', marginBottom: '12px' }}>{pairError}</div>}
                    <div style={{ display: 'flex', gap: '12px' }}>
                      <button onClick={handleJoinWithPairCode} style={{ flex: 1, padding: '10px', background: '#667eea', color: '#FFF', border: 'none', borderRadius: '8px', fontWeight: '600', cursor: 'pointer', fontSize: '13px' }}>OK</button>
                      <button onClick={() => { setShowPairModal(false); setPairInput(''); setPairError(''); }} style={{ flex: 1, padding: '10px', background: '#E5E7EB', border: 'none', borderRadius: '8px', fontWeight: '600', cursor: 'pointer', fontSize: '13px' }}>Abbrechen</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      return (
        <div style={{ minHeight: '100vh', background: '#F8FAFC', display: 'flex', flexDirection: 'column', padding: '20px 0 80px 0', height: '100vh' }}>
          <main style={{ flex: 1, padding: '0 20px 20px 20px', maxWidth: '500px', margin: '0 auto', width: '100%', overflowY: 'auto', WebkitOverflowScrolling: 'touch' }}>
            <nav style={{ display: 'flex', gap: '8px', background: 'rgba(0, 0, 0, 0.02)', padding: '8px', borderRadius: '12px', overflowX: 'auto', marginBottom: '24px' }}>

                          <div key={day} style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '12px' }}>
                            <div style={{ width: '24px', fontSize: '12px', fontWeight: '600', color: '#9CA3AF' }}>{day}</div>
                            <div style={{ flex: 1, height: '24px', background: '#E5E7EB', borderRadius: '4px', overflow: 'hidden' }}>
                              <div style={{ height: '100%', width: (dayData[day] / maxDay) * 100 + '%', background: '#667eea', transition: 'width 0.3s' }}></div>
                            </div>
                            <div style={{ width: '50px', textAlign: 'right', fontSize: '12px', fontWeight: '600' }}>€{dayData[day].toFixed(0)}</div>
                          </div>
                        ))}
                      </div>
                    </>
                  );
                })()}
              </div>
            )}

            {currentView === 'settings' && (
              <div style={{ background: 'rgba(255, 255, 255, 0.7)', borderRadius: '16px', padding: '16px', border: '1px solid rgba(255, 255, 255, 0.3)' }}>
                <div style={{ marginBottom: '24px', padding: '12px', background: 'rgba(16, 185, 129, 0.1)', borderRadius: '10px', border: '1px solid #A7F3D0' }}>
                  <div style={{ fontSize: '13px', fontWeight: '600', color: '#065F46' }}>✓ Cloud Sync aktiv</div>
                  <div style={{ fontSize: '11px', color: '#047857', marginTop: '4px' }}>Deine Daten werden automatisch synchronisiert</div>
                  {firebaseSyncStatus === 'synced' && <div style={{ fontSize: '11px', color: '#10B981', marginTop: '4px' }}>Status: Synchronisiert</div>}
                </div>

                <h3 style={{ margin: '0 0 16px 0', fontSize: '14px', fontWeight: '600' }}>Pair-Code</h3>
                <div style={{ background: 'rgba(255, 255, 255, 0.5)', borderRadius: '12px', padding: '12px', marginBottom: '16px', border: '1px solid rgba(0, 0, 0, 0.04)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <div style={{ fontSize: '16px', fontWeight: '700', letterSpacing: '2px' }}>{appData.pairCode || 'Kein Code'}</div>
                  <button onClick={() => { navigator.clipboard.writeText(appData.pairCode); setCopiedCode(true); setTimeout(() => setCopiedCode(false), 2000); }} style={{ background: 'none', border: 'none', cursor: 'pointer', color: copiedCode ? '#10B981' : '#667eea', fontSize: '14px', fontWeight: '600' }}>{copiedCode ? 'Kopiert' : 'Copy'}</button>
                </div>

                {Object.keys(appData.users).length === 1 && (
                  <button onClick={() => setShowPairModal(true)} style={{ width: '100%', padding: '10px', background: '#667eea', color: '#FFF', border: 'none', borderRadius: '10px', fontWeight: '600', cursor: 'pointer', fontSize: '13px', marginBottom: '24px' }}>Mit Partner verbinden</button>
                )}

                {showPairModal && (
                  <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0, 0, 0, 0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000 }}>
                    <div style={{ background: '#FFF', borderRadius: '16px', padding: '24px', maxWidth: '300px', width: '90%' }}>
                      <h2 style={{ margin: '0 0 16px 0', fontSize: '16px', fontWeight: '600' }}>Mit Partner verbinden</h2>
                      <input type="text" placeholder="Pair-Code" value={pairInput} onChange={(e) => { setPairInput(e.target.value); setPairError(''); }} onKeyPress={(e) => e.key === 'Enter' && handleJoinWithPairCode()} style={{ width: '100%', padding: '10px 12px', border: pairError ? '2px solid #EF4444' : '1.5px solid #E5E7EB', borderRadius: '10px', fontSize: '14px', marginBottom: '12px', boxSizing: 'border-box', textTransform: 'uppercase' }} />
                      {pairError && <div style={{ fontSize: '12px', color: '#EF4444', marginBottom: '12px' }}>{pairError}</div>}
                      <div style={{ display: 'flex', gap: '12px' }}>
                        <button onClick={handleJoinWithPairCode} style={{ flex: 1, padding: '10px', background: '#667eea', color: '#FFF', border: 'none', borderRadius: '8px', fontWeight: '600', cursor: 'pointer', fontSize: '13px' }}>OK</button>
                        <button onClick={() => { setShowPairModal(false); setPairInput(''); setPairError(''); }} style={{ flex: 1, padding: '10px', background: '#E5E7EB', border: 'none', borderRadius: '8px', fontWeight: '600', cursor: 'pointer', fontSize: '13px' }}>Abbrechen</button>
                      </div>
                    </div>
                  </div>
                )}

                <h3 style={{ margin: '0 0 12px 0', fontSize: '14px', fontWeight: '600' }}>Kategorien</h3>
                {appData.categories.map(cat => (
                  <div key={cat.id} style={{ display: 'flex', alignItems: 'center', gap: '10px', padding: '10px', background: 'rgba(255, 255, 255, 0.5)', borderRadius: '8px', marginBottom: '8px', border: '1px solid rgba(0, 0, 0, 0.04)' }}>
                    <div style={{ width: '10px', height: '10px', borderRadius: '50%', background: cat.color, flexShrink: 0 }}></div>
                    {editingCategoryId === cat.id ? (
                      <div style={{ flex: 1 }}>
                        <input type="text" value={cat.name} onChange={(e) => updateCategory(cat.id, { name: e.target.value })} style={{ width: '100%', padding: '6px', border: '1px solid #E5E7EB', borderRadius: '6px', fontSize: '13px', marginBottom: '6px', boxSizing: 'border-box' }} />
                        {cat.rules.map((rule, idx) => (
                          <div key={idx} style={{ display: 'flex', gap: '6px', marginBottom: '6px' }}>
                            <input type="text" value={rule} onChange={(e) => { const newRules = [...cat.rules]; newRules[idx] = e.target.value; updateCategory(cat.id, { rules: newRules }); }} style={{ flex: 1, padding: '6px', border: '1px solid #E5E7EB', borderRadius: '6px', fontSize: '12px', boxSizing: 'border-box' }} />
                            <button onClick={() => updateCategory(cat.id, { rules: cat.rules.filter((_, i) => i !== idx) })} style={{ padding: '6px 8px', background: '#EF4444', color: '#FFF', border: 'none', borderRadius: '4px', fontSize: '11px', cursor: 'pointer' }}>-</button>
                          </div>
                        ))}
                        <button onClick={() => updateCategory(cat.id, { rules: [...cat.rules, ''] })} style={{ width: '100%', padding: '6px', background: '#667eea', color: '#FFF', border: 'none', borderRadius: '4px', fontSize: '12px', cursor: 'pointer', marginBottom: '6px', fontWeight: '600' }}>+ Regel</button>
                        <button onClick={() => setEditingCategoryId(null)} style={{ width: '100%', padding: '6px', background: '#10B981', color: '#FFF', border: 'none', borderRadius: '4px', fontSize: '12px', cursor: 'pointer' }}>OK</button>
                      </div>
                    ) : (
                      <>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: '13px', fontWeight: '500' }}>{cat.name}</div>
                          {cat.rules.length > 0 && <div style={{ fontSize: '11px', color: '#9CA3AF' }}>{cat.rules.join(', ')}</div>}
                        </div>
                        <button onClick={() => setEditingCategoryId(cat.id)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#667eea', padding: '4px', fontSize: '12px', fontWeight: '600' }}>Edit</button>
                      </>
                    )}
                  </div>
                ))}

                <div style={{ marginTop: '16px', padding: '12px', background: 'rgba(255, 255, 255, 0.5)', borderRadius: '8px', border: '1px solid rgba(0, 0, 0, 0.04)' }}>
                  <h4 style={{ margin: '0 0 12px 0', fontSize: '13px', fontWeight: '600' }}>Neue Kategorie</h4>
                  <input type="text" placeholder="Name" value={newCategoryForm.name} onChange={(e) => setNewCategoryForm({...newCategoryForm, name: e.target.value})} style={{ width: '100%', padding: '8px', border: '1px solid #E5E7EB', borderRadius: '6px', fontSize: '13px', marginBottom: '8px', boxSizing: 'border-box' }} />
                  <input type="color" value={newCategoryForm.color} onChange={(e) => setNewCategoryForm({...newCategoryForm, color: e.target.value})} style={{ width: '100%', height: '30px', border: 'none', borderRadius: '6px', cursor: 'pointer', marginBottom: '8px' }} />
                  <div style={{ marginBottom: '12px' }}>
                    <label style={{ fontSize: '12px', fontWeight: '500', color: '#374151', display: 'block', marginBottom: '6px' }}>Regeln (eine pro Zeile)</label>
                    {(newCategoryForm.rules.split('\n').filter(r => r || true).length > 0 ? newCategoryForm.rules.split('\n') : ['']).map((rule, idx) => (
                      <div key={idx} style={{ display: 'flex', gap: '8px', marginBottom: '6px' }}>
                        <input type="text" value={rule} onChange={(e) => { const rules = newCategoryForm.rules.split('\n'); rules[idx] = e.target.value; setNewCategoryForm({...newCategoryForm, rules: rules.join('\n')}); }} placeholder={`Regel ${idx + 1}`} style={{ flex: 1, padding: '8px 10px', border: '1px solid #E5E7EB', borderRadius: '6px', fontSize: '13px', boxSizing: 'border-box' }} />
                        {idx === (newCategoryForm.rules.split('\n').length - 1) && (
                          <button onClick={() => setNewCategoryForm({...newCategoryForm, rules: newCategoryForm.rules + '\n'})} style={{ padding: '8px 12px', background: '#667eea', color: '#FFF', border: 'none', borderRadius: '6px', fontSize: '13px', cursor: 'pointer', fontWeight: '600', minWidth: '40px' }}>+</button>
                        )}
                      </div>
                    ))}
                    <div style={{ fontSize: '11px', color: '#9CA3AF', marginTop: '6px' }}>Jede Regel kann Leerzeichen enthalten (z.B. "kaufland center")</div>
                  </div>
                  <button onClick={addCategory} style={{ width: '100%', padding: '8px', background: '#667eea', color: '#FFF', border: 'none', borderRadius: '6px', fontWeight: '600', cursor: 'pointer', fontSize: '13px' }}>Add</button>
                </div>

                <button onClick={handleLogout} style={{ width: '100%', padding: '12px', background: '#EF4444', color: '#FFF', border: 'none', borderRadius: '10px', fontWeight: '600', cursor: 'pointer', fontSize: '14px', marginTop: '24px' }}>Logout</button>
              </div>
            )}
          </main>

          {showReceiptModal && (
            <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0, 0, 0, 0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1001 }}>
              <div style={{ background: '#FFF', borderRadius: '16px', padding: '20px', maxWidth: '90%', maxHeight: '90vh', overflowY: 'auto' }}>
                <button onClick={() => setShowReceiptModal(null)} style={{ float: 'right', background: 'none', border: 'none', cursor: 'pointer', fontSize: '24px', color: '#9CA3AF' }}>×</button>
                <img src={showReceiptModal} style={{ width: '100%', maxHeight: '80vh', objectFit: 'contain' }} />
              </div>
            </div>
          )}

          {showAddModal && (
            <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0, 0, 0, 0.5)', display: 'flex', alignItems: 'flex-end', zIndex: 1000 }}>
              <div style={{ background: '#FFF', width: '100%', borderRadius: '24px 24px 0 0', padding: '24px', maxHeight: '85vh', overflowY: 'auto' }}>
                <h2 style={{ margin: '0 0 20px 0', fontSize: '20px', fontWeight: '600' }}>{editingExpenseId ? 'Ausgabe bearbeiten' : 'Neue Ausgabe'}</h2>

                <div style={{ marginBottom: '16px' }}>
                  <label style={{ fontSize: '13px', fontWeight: '500', color: '#374151', display: 'block', marginBottom: '6px' }}>Betrag €</label>
                  <input type="number" step="0.01" placeholder="0.00" value={expenseForm.amount} onChange={(e) => setExpenseForm({...expenseForm, amount: e.target.value})} style={{ width: '100%', padding: '10px 12px', border: '1.5px solid #E5E7EB', borderRadius: '10px', fontSize: '14px', boxSizing: 'border-box' }} />
                </div>

                <div style={{ marginBottom: '16px' }}>
                  <label style={{ fontSize: '13px', fontWeight: '500', color: '#374151', display: 'block', marginBottom: '6px' }}>Beschreibung</label>
                  <input type="text" placeholder="Was?" value={expenseForm.description} onChange={(e) => setExpenseForm({...expenseForm, description: e.target.value})} style={{ width: '100%', padding: '10px 12px', border: '1.5px solid #E5E7EB', borderRadius: '10px', fontSize: '14px', boxSizing: 'border-box' }} />
                </div>

                <div style={{ marginBottom: '16px' }}>
                  <label style={{ fontSize: '13px', fontWeight: '500', color: '#374151', display: 'block', marginBottom: '6px' }}>Kategorie {detectCategory(expenseForm.description) && !expenseForm.category && <span style={{ color: '#10B981', fontWeight: '600' }}>(Auto erkannt)</span>}</label>
                  <select value={expenseForm.category} onChange={(e) => setExpenseForm({...expenseForm, category: e.target.value})} style={{ width: '100%', padding: '10px 12px', border: '1.5px solid #E5E7EB', borderRadius: '10px', fontSize: '14px', boxSizing: 'border-box' }}>
                    <option value="">Auto</option>
                    {appData.categories.map(cat => <option key={cat.id} value={cat.id}>{cat.name}</option>)}
                  </select>
                </div>

                <div style={{ marginBottom: '16px' }}>
                  <label style={{ fontSize: '13px', fontWeight: '500', color: '#374151', display: 'block', marginBottom: '6px' }}>Bezahlt von</label>
                  <select value={expenseForm.paidBy} onChange={(e) => setExpenseForm({...expenseForm, paidBy: e.target.value})} style={{ width: '100%', padding: '10px 12px', border: '1.5px solid #E5E7EB', borderRadius: '10px', fontSize: '14px', boxSizing: 'border-box' }}>
                    <option value="">Wählen</option>
                    {Object.values(appData.users).map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
                  </select>
                </div>

                {otherUser && (
                  <div style={{ marginBottom: '16px', padding: '12px', background: 'rgba(102, 126, 234, 0.1)', borderRadius: '10px', border: '1px solid #BAE6FD' }}>
                    <label style={{ fontSize: '13px', fontWeight: '500', color: '#374151', display: 'block', marginBottom: '8px' }}>{user.name}: {expenseForm.participants[currentUser] || 0}%</label>
                    <input type="range" min="0" max="100" value={expenseForm.participants[currentUser] || 0} onChange={(e) => { const val = parseInt(e.target.value); setExpenseForm({...expenseForm, participants: {...expenseForm.participants, [currentUser]: val, [otherUser.id]: 100 - val}}); }} style={{ width: '100%', marginBottom: '12px' }} />
                    <label style={{ fontSize: '13px', fontWeight: '500', color: '#374151', display: 'block' }}>{otherUser.name}: {expenseForm.participants[otherUser.id] || 0}%</label>
                  </div>
                )}

                <div style={{ marginBottom: '16px', padding: '12px', background: 'rgba(16, 185, 129, 0.1)', borderRadius: '10px', border: '1px solid #A7F3D0' }}>
                  <label style={{ fontSize: '13px', fontWeight: '500', color: '#374151', display: 'flex', alignItems: 'center', gap: '8px', cursor: 'pointer' }}>
                    <input type="checkbox" checked={!expenseForm.isShared} onChange={(e) => { setExpenseForm({...expenseForm, isShared: !e.target.checked}); const p = initializeParticipants(); if (e.target.checked) p[currentUser] = 100; else Object.keys(p).forEach(uid => p[uid] = 50); setExpenseForm(prev => ({...prev, participants: p})); }} style={{ cursor: 'pointer' }} />
                    Nur für mich
                  </label>
                </div>

                <div style={{ marginBottom: '16px' }}>
                  <label style={{ fontSize: '13px', fontWeight: '500', color: '#374151', display: 'block', marginBottom: '8px' }}>Kassenzettel (optional)</label>
                  {expenseForm.receipt && <div style={{ marginBottom: '12px', borderRadius: '12px', overflow: 'hidden', maxHeight: '200px', border: '1px solid #E5E7EB' }}><img src={expenseForm.receipt} style={{ width: '100%', height: 'auto', display: 'block' }} /></div>}
                  <label style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '24px', border: '2px dashed #E5E7EB', borderRadius: '12px', cursor: 'pointer', background: 'rgba(102, 126, 234, 0.05)', transition: 'all 0.2s' }}>
                    <input type="file" accept="image/*" onChange={handleReceiptUpload} style={{ display: 'none' }} />
                    <div style={{ fontSize: '32px', marginBottom: '8px' }}>📷</div>
                    <div style={{ fontSize: '13px', fontWeight: '500', color: '#374151', marginBottom: '4px' }}>Kassenzettel hochladen</div>
                    <div style={{ fontSize: '12px', color: '#9CA3AF' }}>oder hierher ziehen</div>
                  </label>
                  {expenseForm.receipt && <button onClick={() => setExpenseForm({...expenseForm, receipt: null})} style={{ marginTop: '12px', width: '100%', padding: '8px', background: '#EF4444', color: '#FFF', border: 'none', borderRadius: '8px', fontSize: '12px', cursor: 'pointer', fontWeight: '600' }}>Löschen</button>}
                </div>

                <div style={{ marginBottom: '16px' }}>
                  <label style={{ fontSize: '13px', fontWeight: '500', color: '#374151', display: 'block', marginBottom: '6px' }}>Datum</label>
                  <input type="date" value={expenseForm.date} onChange={(e) => setExpenseForm({...expenseForm, date: e.target.value})} style={{ width: '100%', padding: '10px 12px', border: '1.5px solid #E5E7EB', borderRadius: '10px', fontSize: '14px', boxSizing: 'border-box' }} />
                </div>

                <div style={{ display: 'flex', gap: '12px' }}>
                  <button onClick={handleAddExpense} style={{ flex: 1, padding: '12px', background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', color: '#FFF', border: 'none', borderRadius: '10px', fontWeight: '600', cursor: 'pointer' }}>{editingExpenseId ? 'Speichern' : 'Erstellen'}</button>
                  <button onClick={() => { setShowAddModal(false); setEditingExpenseId(null); }} style={{ flex: 1, padding: '12px', background: '#E5E7EB', border: 'none', borderRadius: '10px', fontWeight: '600', cursor: 'pointer' }}>Abbrechen</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    ReactDOM.render(<FinanceApp />, document.getElementById('root'));
  </script>
</body>
</html>
